<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Sprinkler Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green:#1a6b3c;--green-light:#e8f5ee;--green-mid:#4caf7d;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --blue:#1d4ed8;--blue-light:#dbeafe;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g600:#4b5563;--g700:#374151;--g900:#111827;
  --r:12px;--rs:8px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--g100);color:var(--g900);min-height:100vh;}
.topbar{background:var(--green);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
.topbar-sub{font-size:11px;opacity:0.75;margin-top:1px;font-family:var(--mono);}
.topbar-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;font-family:var(--font);cursor:pointer;}
.breadcrumb{background:#fff;border-bottom:1px solid var(--g200);padding:10px 16px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--g400);overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.breadcrumb::-webkit-scrollbar{display:none;}
.bc-link{color:var(--green);cursor:pointer;font-weight:500;}
.bc-sep{color:var(--g300);}
.main{padding:16px;max-width:520px;margin:0 auto;}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
label{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px;}
input[type=text],input[type=email],input[type=password],select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:15px;font-family:var(--font);color:var(--g900);background:var(--g50);outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--green);background:#fff;}
textarea{resize:vertical;min-height:72px;line-height:1.5;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:var(--rs);border:1.5px solid var(--g200);background:#fff;color:var(--g700);font-size:14px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all 0.12s;}
.btn:active{transform:scale(0.97);}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn-green:active{background:#145a32;}
.btn-outline-green{border-color:var(--green);color:var(--green);}
.btn-sm{padding:7px 12px;font-size:13px;}
.btn-full{width:100%;}
.btn-danger{border-color:var(--red);color:var(--red);}
.list-item{background:#fff;border:1px solid var(--g200);border-radius:var(--rs);padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.list-item:active{background:var(--green-light);}
.list-item-name{font-size:14px;font-weight:600;}
.list-item-meta{font-size:12px;color:var(--g400);margin-top:2px;}
.chevron{color:var(--g300);font-size:18px;}
.head-item{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:13px;margin-bottom:8px;}
.head-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.head-num{font-size:11px;font-family:var(--mono);color:var(--g400);}
.head-name{font-size:14px;font-weight:600;}
.head-meta{font-size:12px;color:var(--g400);margin-top:2px;}
.head-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-gps{background:var(--green-light);color:var(--green);}
.badge-nogps{background:var(--g100);color:var(--g400);border:1px solid var(--g200);}
.badge-rotor{background:var(--blue-light);color:var(--blue);}
.badge-mist{background:var(--amber-light);color:var(--amber);}
.badge-drip{background:#f0fdf4;color:#166534;}
.gps-box{background:var(--green-light);border:1.5px solid #a7d7bb;border-radius:var(--rs);padding:13px;margin-bottom:12px;}
.gps-box.no-gps{background:var(--g50);border-color:var(--g200);}
.gps-coords{font-family:var(--mono);font-size:12px;color:var(--green);margin:6px 0 10px;}
.gps-coords.no-gps{color:var(--g400);}
.map-link{display:inline-flex;align-items:center;gap:4px;color:var(--blue);font-size:12px;text-decoration:none;padding:5px 10px;border:1px solid #bfdbfe;border-radius:20px;background:var(--blue-light);}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);padding:28px 24px;width:100%;max-width:380px;}
.auth-logo{font-size:22px;font-weight:600;color:var(--green);margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--g400);margin-bottom:24px;}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--g600);}
.auth-switch span{color:var(--green);cursor:pointer;font-weight:500;}
.auth-error{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g900);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:var(--font);z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--g400);font-size:14px;gap:10px;}
hr{border:none;border-top:1px solid var(--g200);margin:14px 0;}
.empty{text-align:center;padding:32px 16px;color:var(--g400);font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:8px;}
.prog-bar{height:6px;background:var(--g200);border-radius:20px;overflow:hidden;margin:6px 0 4px;}
.prog-fill{height:100%;background:var(--green-mid);border-radius:20px;}
.export-box{background:var(--g900);color:#86efac;font-family:var(--mono);font-size:11px;border-radius:var(--rs);padding:14px;white-space:pre-wrap;max-height:260px;overflow-y:auto;line-height:1.6;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:12px;text-align:center;}
.stat-val{font-size:28px;font-weight:600;line-height:1;}
.stat-lbl{font-size:11px;color:var(--g400);margin-top:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;}
.back-btn{display:flex;align-items:center;gap:4px;color:var(--green);font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;padding:4px 0;font-family:var(--font);margin-bottom:16px;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const SURL='https://ovkywaqalotlzwqletsg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92a3l3YXFhbG90bHp3cWxldHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjE3NjMsImV4cCI6MjA5MzEzNzc2M30.8z-wLHE1QJI6gz11WIBqRYQAC698NSs1cpbSWnmIvk0';
const sb=supabase.createClient(SURL,SKEY);

const HEAD_TYPES=['Rotor','Fixed mist','MP rotator','Drip emitter','Bubbler','Other'];
const BRANDS=['Rain Bird','Hunter','Toro','Orbit','K-Rain','Weathermatic','Other'];
const ARCS=['Full (360°)','Half (180°)','Quarter (90°)','Custom'];
const GRASSES=['Bermuda','Fescue'];

let S={view:'loading',user:null,authMode:'login',property:null,zone:null,head:null,valve:null,zoneTab:'heads',properties:[],zones:[],heads:[]};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setView(v){S.view=v;render();window.scrollTo(0,0);}

// AUTH
async function initAuth(){
  const{data}=await sb.auth.getSession();
  if(data.session){S.user=data.session.user;S.view='properties';}
  else{S.view='auth';}
  render();
  sb.auth.onAuthStateChange((event,session)=>{
    if(session){S.user=session.user;if(S.view==='auth'){S.view='properties';loadProperties();}}
    else{S.user=null;S.view='auth';render();}
  });
}

async function handleAuth(e){
  e.preventDefault();
  const email=document.getElementById('ae').value.trim();
  const pw=document.getElementById('ap').value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  const btn=document.getElementById('auth-btn');
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  const isLogin=S.authMode==='login';
  const res=isLogin?await sb.auth.signInWithPassword({email,password:pw}):await sb.auth.signUp({email,password:pw});
  if(res.error){
    err.textContent=res.error.message;err.style.cssText='display:block;background:var(--red-light);color:var(--red);';
    btn.textContent=isLogin?'Sign in':'Create account';btn.disabled=false;
  }else if(!isLogin&&!res.data.session){
    err.textContent='Check your email to confirm your account, then sign in.';
    err.style.cssText='display:block;background:var(--green-light);color:var(--green);';
    btn.textContent='Create account';btn.disabled=false;
  }
}

// PROPERTIES
async function loadProperties(){
  setView('loading');
  const{data,error}=await sb.from('properties').select('*').order('created_at');
  if(error){toast('Error: '+error.message);setView('properties');return;}
  S.properties=data||[];setView('properties');
}

async function saveProperty(){
  const name=document.getElementById('pn').value.trim();
  const addr=document.getElementById('pa').value.trim();
  if(!name){toast('Name is required');return;}
  const btn=document.getElementById('prop-save');btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  const{data,error}=await sb.from('properties').insert({name,address:addr,user_id:S.user.id}).select().single();
  if(error){toast('Error: '+error.message);btn.textContent='Save property';btn.disabled=false;return;}
  S.properties.push(data);toast('Property saved!');
  S.property=data;await loadZones(data.id);
}

async function deleteProperty(id){
  if(!confirm('Delete this property and all its data?'))return;
  await sb.from('properties').delete().eq('id',id);
  S.properties=S.properties.filter(p=>p.id!==id);render();toast('Deleted');
}

// ZONES
async function loadZones(pid){
  setView('loading');
  const{data,error}=await sb.from('zones').select('*').eq('property_id',pid).order('created_at');
  if(error){toast('Error: '+error.message);return;}
  S.zones=data||[];setView('zones');
}

async function saveZone(){
  const name=document.getElementById('zn').value.trim();
  const area=document.getElementById('za').value.trim();
  const controller_zone=document.getElementById('zctrl').value.trim();
  const notes=document.getElementById('zno').value.trim();
  if(!name){toast('Name is required');return;}
  const btn=document.getElementById('zone-save');btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  const{data,error}=await sb.from('zones').insert({name,area,controller_zone,notes,property_id:S.property.id,user_id:S.user.id}).select().single();
  if(error){toast('Error: '+error.message);btn.textContent='Save zone';btn.disabled=false;return;}
  S.zones.push(data);toast('Zone saved!');S.zone=data;await loadHeads(data.id);
}

async function deleteZone(id){
  if(!confirm('Delete this zone and all its heads?'))return;
  await sb.from('zones').delete().eq('id',id);
  S.zones=S.zones.filter(z=>z.id!==id);render();toast('Deleted');
}

// HEADS
async function loadHeads(zid){
  setView('loading');
  const{data,error}=await sb.from('heads').select('*').eq('zone_id',zid).eq('item_type','head').order('created_at');
  if(error){toast('Error: '+error.message);return;}
  S.heads=data||[];
  await loadValve(zid);
  S.zoneTab=S.zoneTab||'heads';
  setView('heads');
}

async function saveHead(andAnother){
  const brand=document.getElementById('hb').value;
  const type=document.getElementById('ht').value;
  const arc=document.getElementById('ha').value;
  const radius=document.getElementById('hr').value.trim();
  const grass=document.getElementById('hgrass').value;
  const notes=document.getElementById('hno').value.trim();
  const lat=document.getElementById('hlat').value.trim();
  const lng=document.getElementById('hlng').value.trim();
  const btnId=andAnother?'head-save-another':'head-save';
  const btn=document.getElementById(btnId);
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  const isEdit=!!S.head;
  let res;
  if(isEdit){
    res=await sb.from('heads').update({brand,type,arc,radius,grass,notes,lat:lat||null,lng:lng||null}).eq('id',S.head.id).select().single();
  }else{
    res=await sb.from('heads').insert({item_type:'head',brand,type,arc,radius,grass,notes,lat:lat||null,lng:lng||null,zone_id:S.zone.id,user_id:S.user.id}).select().single();
  }
  if(res.error){toast('Error: '+res.error.message);btn.textContent=isEdit?'Save changes':(andAnother?'Save & add another':'Save head');btn.disabled=false;return;}
  if(isEdit){
    S.heads=S.heads.map(h=>h.id===res.data.id?res.data:h);
    toast('Head updated!');S.head=null;setView('heads');
  }else{
    S.heads.push(res.data);toast('Head saved!');
    if(andAnother){S.head=null;setView('head');}
    else{S.head=null;setView('heads');}
  }
}

async function deleteHead(id){
  if(!confirm('Delete this head?'))return;
  await sb.from('heads').delete().eq('id',id);
  S.heads=S.heads.filter(h=>h.id!==id);render();toast('Deleted');
}

async function loadValve(zid){
  const{data,error}=await sb.from('heads').select('*').eq('zone_id',zid).eq('item_type','valve').order('created_at');
  if(error){toast('Error: '+error.message);return;}
  S.valve=data&&data.length>0?data[0]:null;
}

async function saveValve(){
  const valve_brand=document.getElementById('vb').value.trim();
  const valve_size=document.getElementById('vs').value.trim();
  const valve_type=document.getElementById('vt').value;
  const notes=document.getElementById('vno').value.trim();
  const lat=document.getElementById('vlat').value.trim();
  const lng=document.getElementById('vlng').value.trim();
  const btn=document.getElementById('valve-save');
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  const isEdit=S.valve&&S.valve.id;
  let res;
  if(isEdit){
    res=await sb.from('heads').update({valve_brand,valve_size,valve_type,notes,lat:lat||null,lng:lng||null}).eq('id',S.valve.id).select().single();
  }else{
    res=await sb.from('heads').insert({item_type:'valve',valve_brand,valve_size,valve_type,notes,lat:lat||null,lng:lng||null,zone_id:S.zone.id,user_id:S.user.id}).select().single();
  }
  if(res.error){toast('Error: '+res.error.message);btn.textContent='Save valve';btn.disabled=false;return;}
  S.valve=res.data;toast('Valve saved!');setView('heads');
}

async function deleteValve(){
  if(!S.valve||!S.valve.id)return;
  if(!confirm('Delete this valve?'))return;
  await sb.from('heads').delete().eq('id',S.valve.id);
  S.valve=null;render();toast('Valve deleted');
}

async function captureGPS(){
  if(!navigator.geolocation){toast('GPS not available');return;}
  const btn=document.getElementById('gps-btn');
  if(btn){btn.innerHTML='<span class="spin"></span> Getting location...';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      document.getElementById('hlat').value=pos.coords.latitude.toFixed(7);
      document.getElementById('hlng').value=pos.coords.longitude.toFixed(7);
      toast('GPS captured! ±'+Math.round(pos.coords.accuracy)+'m');
      if(btn){btn.textContent='Update location';btn.disabled=false;}
    },
    ()=>{toast('Could not get location — allow location access and try again');if(btn){btn.textContent='Capture my location';btn.disabled=false;}},
    {enableHighAccuracy:true,timeout:15000}
  );
}

async function captureValveGPS(){
  if(!navigator.geolocation){toast('GPS not available');return;}
  const btn=document.getElementById('gps-btn');
  if(btn){btn.innerHTML='<span class="spin"></span> Getting location...';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      document.getElementById('vlat').value=pos.coords.latitude.toFixed(7);
      document.getElementById('vlng').value=pos.coords.longitude.toFixed(7);
      toast('GPS captured! ±'+Math.round(pos.coords.accuracy)+'m');
      if(btn){btn.textContent='Update location';btn.disabled=false;}
    },
    ()=>{toast('Could not get location — allow location access and try again');if(btn){btn.textContent='Capture my location';btn.disabled=false;}},
    {enableHighAccuracy:true,timeout:15000}
  );
}

// RENDER
function render(){
  const root=document.getElementById('root');
  const v=S.view;
  if(v==='loading') root.innerHTML=rLoading();
  else if(v==='auth') {root.innerHTML=rAuth();document.getElementById('auth-form').addEventListener('submit',handleAuth);}
  else if(v==='properties') root.innerHTML=rProperties();
  else if(v==='add-property') root.innerHTML=rAddProperty();
  else if(v==='zones') root.innerHTML=rZones();
  else if(v==='add-zone') root.innerHTML=rAddZone();
  else if(v==='heads') root.innerHTML=rHeads();
  else if(v==='head') root.innerHTML=rHead();
  else if(v==='summary') {root.innerHTML=rSummary();}
}

function rLoading(){return`<div class="spinner-wrap"><span class="spin" style="border-color:var(--g200);border-top-color:var(--green);width:20px;height:20px;border-width:3px;"></span>Loading...</div>`;}

function rTopbar(title,sub,showOut){
  return`<div class="topbar"><div><div class="topbar-title">${title}</div>${sub?`<div class="topbar-sub">${sub}</div>`:''}</div>${showOut?`<button class="topbar-btn" onclick="sb.auth.signOut()">Sign out</button>`:''}</div>`;
}

function crumbs(){
  const c=[{l:'Properties',v:'properties'}];
  if(S.property)c.push({l:esc(S.property.name),v:'zones'});
  if(S.zone)c.push({l:esc(S.zone.name),v:'heads'});
  return c;
}

function rBread(){
  const c=crumbs();
  let h='<div class="breadcrumb">';
  c.forEach((item,i)=>{
    if(i>0)h+=`<span class="bc-sep">›</span>`;
    if(i<c.length-1)h+=`<span class="bc-link" onclick="bcGo('${item.v}')">${item.l}</span>`;
    else h+=`<span style="color:var(--g700);font-weight:500;">${item.l}</span>`;
  });
  return h+'</div>';
}

window.bcGo=function(v){
  if(v==='properties'){S.property=null;S.zone=null;S.head=null;setView('properties');}
  else if(v==='zones'){S.zone=null;S.head=null;setView('zones');}
  else if(v==='heads'){S.head=null;setView('heads');}
};

function rAuth(){
  const isL=S.authMode==='login';
  return`<div class="auth-wrap"><div class="auth-card">
    <div class="auth-logo">Sprinkler Map</div>
    <div class="auth-sub">${isL?'Sign in to your account':'Create a new account'}</div>
    <div class="auth-error" id="auth-err" style="display:none;border-radius:var(--rs);padding:10px 12px;margin-bottom:12px;font-size:13px;"></div>
    <form id="auth-form">
      <div class="field"><label>Email</label><input type="email" id="ae" placeholder="you@example.com" autocomplete="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="ap" placeholder="••••••••" autocomplete="${isL?'current-password':'new-password'}" required></div>
      <button type="submit" class="btn btn-green btn-full" id="auth-btn" style="margin-top:4px;">${isL?'Sign in':'Create account'}</button>
    </form>
    <div class="auth-switch">${isL?"Don't have an account?":'Already have an account?'} <span onclick="S.authMode=S.authMode==='login'?'signup':'login';render()">${isL?'Sign up':'Sign in'}</span></div>
  </div></div>`;
}

function rProperties(){
  const email=S.user?.email||'';
  let list=S.properties.length===0
    ?`<div class="empty"><div class="empty-icon">🏡</div>No properties yet.<br>Add your first property below.</div>`
    :S.properties.map(p=>`<div class="list-item" onclick="S.property=S.properties.find(x=>x.id==='${p.id}');loadZones('${p.id}')">
      <div><div class="list-item-name">${esc(p.name)}</div><div class="list-item-meta">${esc(p.address||'No address')}</div></div>
      <div style="display:flex;align-items:center;gap:6px;">

function rHeads(){

    <button onclick="S.zoneTab='heads';render()" style="flex:1;padding:10px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:${tab==='heads'?'var(--green)':'#fff'};color:${tab==='heads'?'#fff':'var(--g600)'};">Heads (${S.heads.length})</button>
    <button onclick="S.zoneTab='valve';render()" style="flex:1;padding:10px;font-size:14px;font-weight:500;border:none;border-left:1.5px solid var(--g200);cursor:pointer;background:${tab==='valve'?'var(--green)':'#fff'};color:${tab==='valve'?'#fff':'var(--g600)'};">Valve ${S.valve?'✓':''}</button>
  </div>`;

  if(tab==='valve'){
    const v=S.valve||{};
    const gps=v.lat&&v.lng;
    const VALVE_TYPES=['Solenoid','Ball valve','Gate valve','Pressure regulating','Other'];
    const valveForm=`
      <div class="card">
        <div class="card-title">Valve details</div>
        <div class="field"><label>Brand</label><input type="text" id="vb" value="${esc(v.valve_brand||'')}" placeholder="e.g. Rain Bird, Hunter"></div>
        <div class="row2">
          <div class="field"><label>Size (inches)</label><input type="text" id="vs" value="${esc(v.valve_size||'')}" placeholder='e.g. 1"'></div>
          <div class="field"><label>Valve type</label>
            <select id="vt">${VALVE_TYPES.map(t=>`<option${v.valve_type===t?' selected':''}>${t}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field"><label>Notes</label><textarea id="vno" placeholder="Leaking, needs replacement...">${esc(v.notes||'')}</textarea></div>
      </div>
      <div class="card">
        <div class="card-title">GPS location</div>
        <div class="${gps?'gps-box':'gps-box no-gps'}">
          <div style="font-size:13px;font-weight:500;color:${gps?'var(--green)':'var(--g600)'}">
            ${gps?'✓ Location saved':'No GPS tag yet'}
          </div>
          ${gps
            ?`<div class="gps-coords">${v.lat}, ${v.lng}</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-green" id="gps-btn" onclick="captureValveGPS()">Update location</button>
                <a class="map-link" href="https://maps.apple.com/?q=${v.lat},${v.lng}" target="_blank">Apple Maps</a>
                <a class="map-link" href="https://maps.google.com/?q=${v.lat},${v.lng}" target="_blank">Google Maps</a>
              </div>`
            :`<div class="gps-coords no-gps">Stand over the valve box and tap below</div>
              <button class="btn btn-green btn-full" id="gps-btn" onclick="captureValveGPS()">Capture my location</button>`
          }
        </div>
        <label style="display:block;margin-bottom:6px;font-size:12px;font-weight:500;color:var(--g600);">Or enter manually</label>
        <div class="row2">
          <div class="field"><label>Latitude</label><input type="text" id="vlat" value="${esc(v.lat||'')}" placeholder="33.7490" inputmode="decimal"></div>
          <div class="field"><label>Longitude</label><input type="text" id="vlng" value="${esc(v.lng||'')}" placeholder="-84.3880" inputmode="decimal"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;padding-bottom:40px;">
        <button class="btn btn-green btn-full" id="valve-save" onclick="saveValve()">${S.valve?'Update valve':'Save valve'}</button>
        ${S.valve?`<button class="btn btn-danger btn-full" onclick="deleteValve()">Delete valve</button>`:''}
      </div>`;
    return rTopbar(esc(z.name),esc(S.property?.name||''),false)+rBread()+`<div class="main">${tabBar}${valveForm}</div>`;
  }

  // HEADS TAB
  let list=S.heads.length===0
    ?`<div class="empty"><div class="empty-icon">🌀</div>No heads yet.<br>Add your first head below.</div>`
    :S.heads.map((h,hi)=>{
      const gps=h.lat&&h.lng;
      return`<div class="head-item">
        <div class="head-item-top">
          <div>
            <div class="head-num">HEAD ${hi+1}</div>
            <div class="head-name">${esc(h.brand)} ${esc(h.type)}</div>
            <div class="head-meta">${esc(h.arc)}${h.radius?' · '+esc(h.radius)+' ft':''}${h.grass?' · '+esc(h.grass):''}</div>

          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${gps?`<span class="badge badge-gps">✓ GPS</span>`:`<span class="badge badge-nogps">No GPS</span>`}
            <button class="btn btn-sm btn-danger" onclick="deleteHead('${h.id}')">Remove</button>
          </div>
        </div>
        <div class="head-actions">
          <button class="btn btn-sm btn-outline-green" onclick="S.head=S.heads.find(x=>x.id==='${h.id}');setView('head')">Edit</button>
          ${gps?`<a class="map-link" href="https://maps.apple.com/?q=${h.lat},${h.lng}" target="_blank">Map</a>`:''}
        </div>
      </div>`;
    }).join('');
  return rTopbar(esc(z.name),esc(S.property?.name||''),false)+rBread()+`<div class="main">

function rSummary(){
  const zones=S.zones;
  const allH=S.heads;
  let total=allH.length,gpsC=0,rotors=0,misters=0,drip=0;
  allH.forEach(h=>{
    if(h.lat&&h.lng)gpsC++;
    if(h.type==='Rotor'||h.type==='MP rotator')rotors++;
    else if(h.type==='Fixed mist')misters++;
    else if(h.type==='Drip emitter'||h.type==='Bubbler')drip++;
  });
  const pct=total>0?Math.round(gpsC/total*100):0;

  const csv=[['Zone','Zone Name','Area','Head #','Brand','Type','Arc','Radius (ft)','Grass','Lat','Lng','Notes']];
  allH.forEach((h,hi)=>{
    const z=zones.find(z=>z.id===h.zone_id)||{};
    csv.push([zones.indexOf(z)+1,z.name||'',z.area||'',hi+1,h.brand,h.type,h.arc,h.radius||'',h.grass||'',h.lat||'',h.lng||'',h.notes||'']);
  });
  window._csv=csv.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');

  const txt=zones.map((z,i)=>{
    const zh=allH.filter(h=>h.zone_id===z.id);
    const lines=[`ZONE ${i+1}: ${z.name}`,`Area: ${z.area||'—'}`,`Notes: ${z.notes||'—'}`,`Heads (${zh.length}):`];
    zh.forEach((h,hi)=>{
      const g=h.lat&&h.lng?` | GPS: ${h.lat},${h.lng}`:'';
      lines.push(`  ${hi+1}. ${h.brand} ${h.type} | ${h.arc} | ${h.radius||'?'}ft | Grass: ${h.grass||'—'}${h.notes?' | '+h.notes:''}${g}`);
    });
    return lines.join('\n');
  }).join('\n\n');
  window._txt=txt;

  const zrows=zones.map((z,i)=>{
    const zh=allH.filter(h=>h.zone_id===z.id);
    const hg=zh.filter(h=>h.lat&&h.lng).length;
    const zp=zh.length>0?Math.round(hg/zh.length*100):0;
    return`<div class="list-item" onclick="S.zone=S.zones.find(x=>x.id==='${z.id}');loadHeads('${z.id}')">
      <div>
        <div class="list-item-name">${esc(z.name)}</div>
        <div class="list-item-meta">${zh.length} heads · ${hg}/${zh.length} GPS · ${esc(z.area||'No area')}</div>
        <div class="prog-bar" style="width:120px;margin-top:6px;"><div class="prog-fill" style="width:${zp}%"></div></div>
      </div>
      <span class="chevron">›</span>
    </div>`;
  }).join('');

  return rTopbar(esc(S.property?.name||'Summary'),'Summary',false)+rBread()+`<div class="main">
    <button class="back-btn" onclick="setView('zones')">← Back to zones</button>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val">${zones.length}</div><div class="stat-lbl">Zones</div></div>
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Heads</div></div>
      <div class="stat"><div class="stat-val">${gpsC}</div><div class="stat-lbl">GPS tagged</div></div>
      <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Coverage</div></div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div class="card-title">GPS progress</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--g400);margin-top:4px;">${gpsC} of ${total} heads tagged</div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div class="card-title">Head types</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge badge-rotor">${rotors} rotor/MP</span>
        <span class="badge badge-mist">${misters} mist</span>
        <span class="badge badge-drip">${drip} drip/bubbler</span>
        ${total-rotors-misters-drip>0?`<span class="badge">${total-rotors-misters-drip} other</span>`:''}
      </div>
    </div>
    <div style="margin-bottom:10px;">${zrows}</div>
    <div class="card">
      <div class="card-title" style="margin-bottom:10px;">Export data</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <button class="btn btn-sm btn-green" onclick="navigator.clipboard.writeText(window._txt||'').then(()=>toast('Copied!')).catch(()=>toast('Copy failed'))">Copy text</button>
        <button class="btn btn-sm btn-green" onclick="(()=>{const b=new Blob([window._csv||''],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='sprinkler-map.csv';a.click();URL.revokeObjectURL(u);setTimeout(()=>{window.location.href='mailto:?subject='+encodeURIComponent('Sprinkler Map Data')+'&body='+encodeURIComponent('CSV attached.\n\n'+(window._txt||''));},600);})()">Email as CSV</button>
      </div>
      <div class="export-box">${esc(txt)}</div>
    </div>
    <div style="height:40px;"></div>
  </div>`;
}

async function exportPropertyCSV(pid){
  toast('Preparing CSV...');
  const{data:zones}=await sb.from('zones').select('*').eq('property_id',pid).order('created_at');
  const{data:heads}=await sb.from('heads').select('*').in('zone_id',(zones||[]).map(z=>z.id)).order('item_type').order('created_at');
  const prop=S.properties.find(p=>p.id===pid)||{};
  const rows=[['Property','Address','Zone','Controller #','Area','Item','#','Brand','Type','Arc/Size','Radius/Size','Grass','Latitude','Longitude','Notes']];
  (zones||[]).forEach(z=>{
    const zh=(heads||[]).filter(h=>h.zone_id===z.id&&h.item_type!=='valve');
    const valve=(heads||[]).find(h=>h.zone_id===z.id&&h.item_type==='valve');
    if(valve){
      rows.push([prop.name,prop.address||'',z.name,z.controller_zone||'',z.area||'','Valve','',valve.valve_brand||'',valve.valve_type||'','',valve.valve_size||'','',valve.lat||'',valve.lng||'',valve.notes||'']);
    }
    if(zh.length===0&&!valve){
      rows.push([prop.name,prop.address||'',z.name,z.controller_zone||'',z.area||'','','','','','','','','','','']);
    } else {
      zh.forEach((h,hi)=>{
        rows.push([prop.name,prop.address||'',z.name,z.controller_zone||'',z.area||'','Head',hi+1,h.brand,h.type,h.arc,h.radius||'',h.grass||'',h.lat||'',h.lng||'',h.notes||'']);
      });
    }
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${(prop.name||'property').replace(/\s+/g,'-').toLowerCase()}-sprinkler-map.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}
